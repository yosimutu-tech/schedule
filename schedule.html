<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap');

  :root {
    --bg: #f7f4f0;
    --white: #ffffff;
    --primary: #d4845a;
    --primary-light: #f2e4d8;
    --primary-dark: #b5623b;
    --text: #2d2520;
    --text-light: #8a7a72;
    --border: #e8ddd6;
    --today: #d4845a;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  header {
    background: var(--white);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--primary-dark);
  }

  header .emoji { font-size: 1.6rem; }

  .container {
    max-width: 800px;
    margin: 24px auto;
    padding: 0 16px;
  }

  .calendar-card {
    background: var(--white);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .cal-header {
    background: var(--primary);
    color: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cal-header h2 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
  }

  .nav-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.4); }

  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--primary-light);
    padding: 8px 16px;
  }

  .weekday {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--primary-dark);
    padding: 6px 0;
  }

  .weekday:first-child { color: #c0392b; }
  .weekday:last-child  { color: #2980b9; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    padding: 1px;
  }

  .day-cell {
    background: var(--white);
    min-height: 72px;
    padding: 6px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .day-cell:hover { background: var(--primary-light); }

  .day-cell.empty {
    background: #faf8f6;
    cursor: default;
  }

  .day-cell.today .day-num {
    background: var(--today);
    color: white;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .day-cell.sunday .day-num { color: #c0392b; }
  .day-cell.saturday .day-num { color: #2980b9; }

  .day-num {
    font-size: 0.85rem;
    font-weight: 500;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2px;
  }

  .event-dots {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: 2px;
  }

  .event-dot {
    background: var(--primary);
    color: white;
    font-size: 0.6rem;
    padding: 1px 5px;
    border-radius: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    overflow: hidden;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    background: var(--primary);
    color: white;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h3 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
  }

  .close-btn {
    background: rgba(255,255,255,0.25);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .close-btn:hover { background: rgba(255,255,255,0.4); }

  .modal-body { padding: 20px; }

  .event-list { margin-bottom: 16px; }

  .event-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--primary-light);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 8px;
  }

  .event-item span {
    font-size: 0.9rem;
    color: var(--text);
    flex: 1;
  }

  .event-time {
    font-size: 0.75rem;
    color: var(--primary-dark);
    font-weight: 700;
    margin-right: 8px;
  }

  .del-btn {
    background: none;
    border: none;
    color: #c0392b;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.2s;
  }

  .del-btn:hover { background: #fdecea; }

  .add-form {
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }

  .add-form label {
    font-size: 0.8rem;
    color: var(--text-light);
    font-weight: 500;
    display: block;
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .add-form label:first-child { margin-top: 0; }

  .add-form input, .add-form textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    background: var(--bg);
  }

  .add-form input:focus, .add-form textarea:focus {
    border-color: var(--primary);
  }

  .add-form textarea {
    resize: vertical;
    min-height: 60px;
  }

  .add-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .add-btn:hover { background: var(--primary-dark); }
  .add-btn:active { transform: scale(0.98); }

  .empty-msg {
    text-align: center;
    color: var(--text-light);
    font-size: 0.85rem;
    padding: 8px 0;
  }

  .today-card {
    background: var(--white);
    border-radius: 20px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .today-header {
    background: var(--primary-light);
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .today-header h3 {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 1rem;
    color: var(--primary-dark);
    font-weight: 700;
  }

  .today-list { padding: 12px 16px; }

  .today-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .today-item:last-child { border-bottom: none; }

  .today-dot {
    width: 10px;
    height: 10px;
    background: var(--primary);
    border-radius: 50%;
    margin-top: 5px;
    flex-shrink: 0;
  }

  .today-info { flex: 1; }

  .today-title {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
  }

  .today-time {
    font-size: 0.75rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  .today-memo {
    font-size: 0.78rem;
    color: var(--text-light);
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <span class="emoji">📅</span>
  <h1>スケジュール管理</h1>
</header>

<div class="container">
  <div class="calendar-card">
    <div class="cal-header">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <h2 id="monthLabel"></h2>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="weekdays">
      <div class="weekday">日</div>
      <div class="weekday">月</div>
      <div class="weekday">火</div>
      <div class="weekday">水</div>
      <div class="weekday">木</div>
      <div class="weekday">金</div>
      <div class="weekday">土</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="today-card">
    <div class="today-header">
      <h3 id="todayLabel">今日の予定</h3>
    </div>
    <div class="today-list" id="todayList"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="event-list" id="eventList"></div>
      <div class="add-form">
        <label>予定のタイトル *</label>
        <input type="text" id="inputTitle" placeholder="例：病院、買い物、会議…" maxlength="30">
        <label>時間（任意）</label>
        <input type="time" id="inputTime">
        <label>メモ（任意）</label>
        <textarea id="inputMemo" placeholder="詳細を入力できます"></textarea>
        <button class="add-btn" onclick="addEvent()">＋ 追加する</button>
      </div>
    </div>
  </div>
</div>

<script>
  let currentYear, currentMonth, selectedDate;
  const today = new Date();
  let events = JSON.parse(localStorage.getItem('schedule_events') || '{}');

  function init() {
    currentYear  = today.getFullYear();
    currentMonth = today.getMonth();
    renderCalendar();
    renderTodayEvents();
  }

  function saveEvents() {
    localStorage.setItem('schedule_events', JSON.stringify(events));
  }

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function renderCalendar() {
    const label = document.getElementById('monthLabel');
    label.textContent = `${currentYear}年 ${currentMonth+1}月`;
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    const firstDay = new Date(currentYear, currentMonth, 1).getDay();
    const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
